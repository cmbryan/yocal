name: Deploy Generated File via FTP

on:
  push:
    branches:
      - main # Or the branch you want this to run on

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      db_changed: ${{ steps.db_changes.outputs.db }}
      api_changed: ${{ steps.api_changes.outputs.api }}
      mobile_changed: ${{ steps.mobile_changes.outputs.mobile }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect database changes
        id: db_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'db/**'

      - name: Detect API changes
        id: api_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api-php/**'

      - name: Detect mobile app changes
        id: mobile_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            mobile:
              - 'yocal-mobile/**'

  database:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Report database test decision
        run: |
          if [ "${{ needs.changes.outputs.db_changed }}" = "true" ]; then
            echo "Database changes detected: running db build and uploading result."
          else
            echo "No database changes detected: skipping db build."
          fi

      - name: Checkout repository
        if: needs.changes.outputs.db_changed == 'true'
        uses: actions/checkout@v4

      - name: Set up environment (if needed for your script)
        if: needs.changes.outputs.db_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script to generate database
        if: needs.changes.outputs.db_changed == 'true'
        run: |
          make db-build

      - name: PHP tests
        if: needs.changes.outputs.db_changed == 'true'
        run: |
          make php-test

      - name: Deploy database files to FTP
        if: needs.changes.outputs.db_changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './db/yocal/'
          server-dir: '/httpdocs/wp/wp-content/uploads/yocal/'

  api:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Report API test decision
        run: |
          if [ "${{ needs.changes.outputs.api_changed }}" = "true" ]; then
            echo "API changes detected: running API tests and uploading scripts."
          else
            echo "No API changes detected: skipping API upload."
          fi

      - name: Checkout repository
        if: needs.changes.outputs.api_changed == 'true'
        uses: actions/checkout@v4

      - name: PHP tests
        if: needs.changes.outputs.api_changed == 'true'
        run: |
          make php-test

      - name: Deploy API files to FTP
        if: needs.changes.outputs.api_changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './api-php/'
          server-dir: '/httpdocs/api-php/'
          exclude: |
            **/.htaccess
            **/*.sh

  mobile:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Report mobile test decision
        run: |
          if [ "${{ needs.changes.outputs.mobile_changed }}" = "true" ]; then
            echo "yocal-mobile changes detected: running mobile tests."
          else
            echo "No yocal-mobile changes detected: skipping mobile tests."
          fi

      - name: Checkout repository
        if: needs.changes.outputs.mobile_changed == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: needs.changes.outputs.mobile_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'yocal-mobile/package-lock.json'

      - name: Mobile app tests
        if: needs.changes.outputs.mobile_changed == 'true'
        run: |
          cd yocal-mobile
          npm ci
          npm run typecheck
          npm run test:ci

  mobile_pages:
    runs-on: ubuntu-latest
    needs:
      - changes
      - mobile
    if: needs.changes.outputs.mobile_changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Report mobile pages deploy decision
        run: |
          echo "yocal-mobile changes detected: building web app and deploying to GitHub Pages."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'yocal-mobile/package-lock.json'

      - name: Build Expo web output
        run: |
          cd yocal-mobile
          npm ci
          npx expo export --platform web --output-dir dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: yocal-mobile/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
