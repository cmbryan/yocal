name: Deploy Generated File via FTP

on:
  push:
    branches:
      - main # Or the branch you want this to run on

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up environment (if needed for your script)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script to generate file
      run: |
        make db-build

    - name: Copy to staging directory
      run: |
        mkdir -p db/out
        cp db/YOCal_Master.db db/out/YOCal_Master.db

    - name: Deploy file to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # port: ${{ secrets.FTP_PORT }} # Optional, remove if using default 21
        local-dir: './db/out/' # The local directory where your generated file is
        server-dir: '/httpdocs/wp/wp-content/uploads/yocal/' # The remote path on your FTP server
