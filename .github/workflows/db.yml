name: Database Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - db/**

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run script to generate database
        run: make db-build

      - name: PHP tests
        run: make php-test

      - name: Deploy database files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./db/yocal/
          server-dir: /httpdocs/wp/wp-content/uploads/yocal/
